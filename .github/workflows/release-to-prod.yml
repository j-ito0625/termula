name: Release to production

on:
  push:
    tags: ["v*"]

jobs:
  sync-to-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove dev-only files
        run: |
          rm -f CLAUDE.md
          rm -rf .claude
          rm -rf docs
          rm -f assets/gen-*.py assets/*.typ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove dev-only files for production release" --allow-empty

      - name: Push release branch to production repo
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          git remote add prod https://x-access-token:${{ secrets.PROD_REPO_TOKEN }}@github.com/nicokeywords/termula.git
          git push prod HEAD:refs/heads/release/${tag} --force

      - name: Create PR on production repo
        env:
          GH_TOKEN: ${{ secrets.PROD_REPO_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh pr create \
            --repo nicokeywords/termula \
            --head "release/${tag}" \
            --base main \
            --title "Release ${tag}" \
            --body "$(cat <<EOF
          ## Release ${tag}

          Automated release from dev repository.

          **Dev-only files excluded:** CLAUDE.md, docs/, asset generation scripts

          ### Checklist
          - [ ] Review changes
          - [ ] Merge to trigger release build
          - [ ] Publish to crates.io: \`cargo publish\`
          EOF
          )"
